services:
  postgres:
    image: postgres:16-alpine
    container_name: gymapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymapp
      POSTGRES_PASSWORD: gymapp
      POSTGRES_DB: gymapp_dev
    ports:
      - "5432:5432"
    volumes:
      - gymapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymapp -d gymapp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymapp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - gymapp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gymapp_postgres_data:
  gymapp_redis_data:
